<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Contacto - Estación Floresta</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="contenedorPrincipal">

        <!-- NAVBAR -->

        <header>

            <nav class="navbar">

                <!-- LOGO -->

                <div class="logo">

                    <img src="img/image.png"
                    alt="Logo Estación Floresta">

                    <h2>Estación Floresta</h2>

                </div>

                <!-- LINKS -->

                <ul class="nav-links">

                    <li>
                        <a href="index.html">
                            Inicio
                        </a>
                    </li>

                    <li>
                        <a href="Horarios.html">
                            Horarios
                        </a>
                    </li>

                    <li>
                        <a href="ComoLlegar.html">
                            Cómo llegar
                        </a>
                    </li>

                    <li>
                        <a class="active"
                        href="Contacto.html">
                            Contacto
                        </a>
                    </li>

                </ul>

            </nav>

        </header>

        <!-- MAIN -->

        <main class="hero">

            <h1>
                Contacto
            </h1>

            <p>
                ¿Tenés dudas, consultas o sugerencias?
                Completá el formulario y nos pondremos
                en contacto con vos.
            </p>

            <div class="linea"></div>

            <!-- FORMULARIO -->

            <form class="formulario-contacto">

                <input type="text"
                placeholder="Nombre completo"
                required>

                <input type="email"
                placeholder="Correo electrónico"
                required>

                <textarea
                placeholder="Escribí tu mensaje..."
                rows="6"
                required></textarea>

                <button type="submit">
                    Enviar mensaje
                </button>

            </form>

        </main>

        <!-- FOOTER -->

        <footer>

            Todos los derechos reservados -
            República Argentina © 2026.

        </footer>

    </div>

</body>

</html>
